<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Player - Secure Mode</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- System Fonts & Icons -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overscroll-behavior-y: none; /* Prevent pull to refresh on mobile */
            user-select: none; /* Prevent text selection */
            -webkit-user-select: none;
        }
        
        * { -webkit-tap-highlight-color: transparent; }

        /* Dynamic Background for Start Screen */
        .bg-login {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .ios-input {
            background: rgba(0, 0, 0, 0.03);
            border: none;
            transition: all 0.2s;
        }
        .ios-input:focus {
            background: rgba(0, 122, 255, 0.05);
            outline: none;
            box-shadow: inset 0 0 0 2px #007AFF;
        }

        /* Radio Buttons Custom iOS Style */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 2px solid transparent;
        }
        input[type="radio"]:checked + .option-card {
            background-color: #f0f8ff;
            border-color: #007AFF;
            transform: scale(0.99);
        }
        input[type="radio"]:checked + .option-card .opt-letter {
            background-color: #007AFF;
            color: white;
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }

        /* Security Red Alert Animation */
        @keyframes flashRed {
            0%, 100% { box-shadow: inset 0 0 0px 0px rgba(255,0,0,0); }
            50% { box-shadow: inset 0 0 100px 20px rgba(255,0,0,0.6); }
        }
        .violation-flash { animation: flashRed 1s ease-in-out; }
    </style>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 h-screen w-screen overflow-hidden text-gray-900" oncontextmenu="return false;">

    <!-- APP CONTAINER -->
    <div id="app" class="h-full w-full">
        <!-- Rendered via JS -->
    </div>

    <!-- AUDIO FOR WARNINGS -->
    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script>
        // --- CUSTOM iOS SWEETALERT ---
        const iosAlert = Swal.mixin({
            customClass: {
                popup: 'rounded-3xl glass-panel border-0 shadow-2xl',
                title: 'font-bold text-gray-900',
                confirmButton: 'bg-blue-500 text-white rounded-xl px-6 py-3 font-semibold w-full mb-2',
                cancelButton: 'bg-gray-200 text-gray-800 rounded-xl px-6 py-3 font-semibold w-full'
            },
            buttonsStyling: false
        });

        // --- APP STATE ---
        const state = {
            view: 'LOGIN', // LOGIN, EXAM, RESULT
            student: { name: '', class: '' },
            examData: null,
            answers: {},
            currentQ: 0,
            timeLeft: 0,
            timerInterval: null,
            
            // ANTI-CHEAT ENGINE
            security: {
                strikes: 0,
                maxStrikes: 3,
                violationsLog: [],
                isActive: false // only active during exam
            }
        };

        const DOM = document.getElementById('app');

        // --- ANTI CHEAT SYSTEM (STRICT MODE) ---
        function initAntiCheat() {
            state.security.isActive = true;

            // 1. Detect Visibility Change (Tab Switch / Minimize)
            document.addEventListener("visibilitychange", handleViolation);
            
            // 2. Detect Blur (Clicking outside browser / Opening start menu)
            window.addEventListener("blur", handleViolation);

            // 3. Prevent Keyboard Shortcuts
            document.addEventListener('keydown', function(e) {
                if(!state.security.isActive) return;
                
                // Block F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
                if (e.key === 'F12' || 
                   (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                   (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                    triggerStrike("Mencoba membuka Developer Tools");
                }
                
                // Block Copy Paste
                if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'x')) {
                    e.preventDefault();
                }

                // Block Print Screen
                if (e.key === "PrintScreen") {
                    navigator.clipboard.writeText(''); // clear clipboard
                    triggerStrike("Mencoba mengambil Screenshot");
                }
            });

            // 4. Force Fullscreen request
            requestFullScreen();
        }

        function stopAntiCheat() {
            state.security.isActive = false;
            document.removeEventListener("visibilitychange", handleViolation);
            window.removeEventListener("blur", handleViolation);
            if(document.fullscreenElement) {
                document.exitFullscreen().catch(()=>{});
            }
        }

        function requestFullScreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
        }

        function handleViolation() {
            if (!state.security.isActive) return;
            // Debounce to prevent double trigger from visibility and blur at same time
            if(window.lastViolationTime && (Date.now() - window.lastViolationTime) < 2000) return;
            window.lastViolationTime = Date.now();

            triggerStrike("Keluar dari layar ujian / Kehilangan fokus layar");
        }

        function triggerStrike(reason) {
            state.security.strikes++;
            state.security.violationsLog.push(`${new Date().toLocaleTimeString()} - ${reason}`);
            
            document.body.classList.add('violation-flash');
            setTimeout(() => document.body.classList.remove('violation-flash'), 1000);
            
            try { document.getElementById('alert-sound').play(); } catch(e){}

            if (state.security.strikes >= state.security.maxStrikes) {
                // FATAL PENALTY
                stopAntiCheat();
                Swal.fire({
                    icon: 'error',
                    title: 'PELANGGARAN FATAL',
                    text: 'Anda telah melanggar aturan ujian sebanyak 3 kali. Ujian dihentikan paksa!',
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    showConfirmButton: true,
                    confirmButtonText: 'Selesaikan',
                    confirmButtonColor: '#d33',
                    customClass: { popup: 'rounded-3xl border-4 border-red-500' }
                }).then(() => {
                    finishExam(true); // force finish
                });
            } else {
                // WARNING
                iosAlert.fire({
                    icon: 'warning',
                    title: `Peringatan ${state.security.strikes} dari ${state.security.maxStrikes}`,
                    html: `<b>Pelanggaran:</b> ${reason}<br><br><span class="text-sm text-red-500">Jika mencapai 3x pelanggaran, ujian otomatis dibatalkan dan disubmit paksa!</span>`,
                    confirmButtonText: 'Kembali ke Ujian',
                    confirmButtonColor: '#ff3b30'
                }).then(() => {
                    requestFullScreen(); // Force back to fullscreen
                });
            }
        }


        // --- RENDER LOGIC ---
        function render() {
            if (state.view === 'LOGIN') renderLogin();
            else if (state.view === 'EXAM') renderExam();
            else if (state.view === 'RESULT') renderResult();
        }

        // --- 1. LOGIN SCREEN ---
        function renderLogin() {
            DOM.className = "h-full w-full bg-login flex items-center justify-center p-4";
            DOM.innerHTML = `
                <div class="glass-panel w-full max-w-md rounded-[2rem] p-8 transform transition-all">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 bg-white rounded-2xl shadow-lg mx-auto flex items-center justify-center mb-4">
                            <i class="fa-solid fa-shield-halved text-2xl text-blue-500"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-900">Secure CBT App</h1>
                        <p class="text-sm text-gray-600 mt-1">Sistem Ujian Terawasi V2</p>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <input type="text" id="stu-name" class="w-full ios-input rounded-xl p-4 font-medium" placeholder="Nama Lengkap Siswa">
                        </div>
                        <div>
                            <input type="text" id="stu-class" class="w-full ios-input rounded-xl p-4 font-medium" placeholder="Kelas / Ruang">
                        </div>
                        
                        <div class="pt-2">
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">File Soal (.enc)</label>
                            <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:bg-white/50 transition-colors">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <i class="fa-solid fa-file-arrow-up text-gray-400 text-xl mb-2"></i>
                                    <p class="text-sm text-gray-500 font-medium" id="file-label">Pilih File Soal</p>
                                </div>
                                <input id="file-input" type="file" accept=".enc,.json" class="hidden" onchange="handleFile(event)">
                            </label>
                        </div>

                        <div>
                            <input type="password" id="stu-token" class="w-full ios-input rounded-xl p-4 font-medium text-center tracking-widest uppercase" placeholder="TOKEN UJIAN">
                        </div>

                        <button onclick="startLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-xl p-4 font-bold shadow-lg shadow-blue-500/40 transition-all mt-4">
                            MULAI UJIAN
                        </button>
                    </div>
                </div>
            `;
        }

        let uploadedEncryptedData = null;
        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-label').innerText = file.name;
            const reader = new FileReader();
            reader.onload = (evt) => { uploadedEncryptedData = evt.target.result; };
            reader.readAsText(file);
        }

        function startLogin() {
            const name = document.getElementById('stu-name').value.trim();
            const cls = document.getElementById('stu-class').value.trim();
            const token = document.getElementById('stu-token').value.trim().toUpperCase();

            if (!name || !cls || !uploadedEncryptedData || !token) {
                iosAlert.fire('Oops', 'Lengkapi semua data dan pilih file soal.', 'warning');
                return;
            }

            try {
                // Decrypt Data
                const bytes = CryptoJS.AES.decrypt(uploadedEncryptedData, token);
                const decryptedData = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));

                if (!decryptedData.questions || decryptedData.questions.length === 0) throw new Error("Invalid format");

                // Setup State
                state.student = { name, class: cls };
                state.examData = decryptedData;
                state.timeLeft = decryptedData.duration * 60;
                
                iosAlert.fire({
                    title: 'Perhatian!',
                    html: '<div class="text-left text-sm text-gray-600 space-y-2"><b>Ujian ini menggunakan Strict Mode:</b><ul class="list-disc pl-5 mt-2"><li>Wajib Layar Penuh.</li><li>Dilarang keluar dari aplikasi.</li><li>Dilarang membuka tab/jendela lain.</li><li>Maksimal pelanggaran 3x otomatis gagal.</li></ul></div>',
                    icon: 'warning',
                    confirmButtonText: 'Saya Mengerti & Mulai',
                    confirmButtonColor: '#007AFF',
                    allowOutsideClick: false
                }).then((result) => {
                    if (result.isConfirmed) {
                        state.view = 'EXAM';
                        initAntiCheat();
                        startTimer();
                        render();
                    }
                });

            } catch (err) {
                iosAlert.fire('Akses Ditolak', 'Token salah atau file soal rusak.', 'error');
            }
        }


        // --- 2. EXAM SCREEN ---
        function renderExam() {
            DOM.className = "h-full w-full bg-[#f2f2f7] flex flex-col";
            const q = state.examData.questions[state.currentQ];
            const currentAns = state.answers[state.currentQ] || null;

            DOM.innerHTML = `
                <!-- iOS Style Top Bar -->
                <div class="glass-panel px-4 py-3 flex justify-between items-center sticky top-0 z-10">
                    <div class="flex items-center gap-3">
                        <div class="bg-red-50 text-red-600 px-3 py-1.5 rounded-lg font-mono font-bold text-sm border border-red-100 flex items-center gap-2">
                            <i class="fa-regular fa-clock"></i> <span id="timer-display">--:--</span>
                        </div>
                    </div>
                    <div class="font-bold text-gray-800 text-sm">
                        Soal ${state.currentQ + 1} / ${state.examData.questions.length}
                    </div>
                    <button onclick="confirmSubmit()" class="text-blue-600 font-bold text-sm bg-blue-50 px-4 py-1.5 rounded-lg active:bg-blue-100">
                        Selesai
                    </button>
                </div>

                <!-- Main Content Scrollable -->
                <div class="flex-1 overflow-y-auto p-4 pb-24">
                    <div class="max-w-3xl mx-auto space-y-6">
                        
                        <!-- Question Card -->
                        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                            <p class="text-lg font-medium text-gray-800 leading-relaxed whitespace-pre-wrap">${q.text}</p>
                        </div>

                        <!-- Options List -->
                        <div class="space-y-3">
                            ${['A', 'B', 'C', 'D'].map(opt => `
                                <label class="block relative cursor-pointer">
                                    <input type="radio" name="answer" value="${opt}" class="peer sr-only" ${currentAns === opt ? 'checked' : ''} onchange="saveAnswer('${opt}')">
                                    <div class="option-card bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm">
                                        <div class="opt-letter w-8 h-8 rounded-full bg-gray-100 text-gray-600 font-bold flex items-center justify-center flex-shrink-0 transition-colors">
                                            ${opt}
                                        </div>
                                        <div class="text-gray-700 font-medium select-none">${q.options[opt]}</div>
                                    </div>
                                </label>
                            `).join('')}
                        </div>

                    </div>
                </div>

                <!-- Bottom Navigation (Prev/Next) -->
                <div class="glass-panel fixed bottom-0 w-full px-4 py-4 flex justify-between items-center pb-safe">
                    <div class="max-w-3xl mx-auto w-full flex justify-between gap-4">
                        <button onclick="navigate(-1)" class="flex-1 py-3 rounded-xl font-bold bg-white text-gray-700 shadow-sm disabled:opacity-50 disabled:active:scale-100 active:scale-95 transition-transform" ${state.currentQ === 0 ? 'disabled' : ''}>
                            <i class="fa-solid fa-chevron-left mr-1"></i> Prev
                        </button>
                        <button onclick="openGrid()" class="w-14 h-14 rounded-full bg-white text-blue-600 shadow-sm flex items-center justify-center text-xl active:scale-90 transition-transform">
                            <i class="fa-solid fa-table-cells-large"></i>
                        </button>
                        <button onclick="navigate(1)" class="flex-1 py-3 rounded-xl font-bold bg-blue-600 text-white shadow-md shadow-blue-500/30 disabled:opacity-50 disabled:active:scale-100 active:scale-95 transition-transform" ${state.currentQ === state.examData.questions.length - 1 ? 'disabled' : ''}>
                            Next <i class="fa-solid fa-chevron-right ml-1"></i>
                        </button>
                    </div>
                </div>

                <!-- Grid Modal -->
                <div id="grid-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] hidden flex-col justify-end opacity-0 transition-opacity">
                    <div class="bg-white w-full rounded-t-3xl p-6 transform translate-y-full transition-transform" id="grid-content">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-gray-900">Navigasi Soal</h3>
                            <button onclick="closeGrid()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="grid grid-cols-5 sm:grid-cols-8 gap-3 max-h-[50vh] overflow-y-auto p-1">
                            ${state.examData.questions.map((_, i) => `
                                <button onclick="goToQ(${i})" class="w-full aspect-square rounded-xl font-bold text-sm flex items-center justify-center transition-all ${
                                    i === state.currentQ ? 'bg-blue-600 text-white shadow-md shadow-blue-500/30' : 
                                    state.answers[i] ? 'bg-green-100 text-green-700 border border-green-200' : 
                                    'bg-gray-100 text-gray-500 hover:bg-gray-200'
                                }">
                                    ${i + 1}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            updateTimerDisplay();
        }

        // Logic functions
        function saveAnswer(opt) {
            state.answers[state.currentQ] = opt;
            // Auto next visual feedback (optional, keeping it manual to let them review)
        }

        function navigate(dir) {
            state.currentQ += dir;
            renderExam();
        }

        function goToQ(i) {
            state.currentQ = i;
            closeGrid();
            setTimeout(renderExam, 300); // wait for modal animation
        }

        function openGrid() {
            const m = document.getElementById('grid-modal');
            const c = document.getElementById('grid-content');
            m.classList.remove('hidden');
            m.classList.add('flex');
            setTimeout(() => {
                m.classList.remove('opacity-0');
                c.classList.remove('translate-y-full');
            }, 10);
        }

        function closeGrid() {
            const m = document.getElementById('grid-modal');
            const c = document.getElementById('grid-content');
            m.classList.add('opacity-0');
            c.classList.add('translate-y-full');
            setTimeout(() => {
                m.classList.add('hidden');
                m.classList.remove('flex');
            }, 300);
        }

        // Timer
        function startTimer() {
            state.timerInterval = setInterval(() => {
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 0) {
                    clearInterval(state.timerInterval);
                    iosAlert.fire('Waktu Habis', 'Sistem otomatis menyimpan jawaban.', 'info').then(() => finishExam(false));
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const el = document.getElementById('timer-display');
            if(!el) return;
            const m = Math.floor(state.timeLeft / 60).toString().padStart(2, '0');
            const s = (state.timeLeft % 60).toString().padStart(2, '0');
            el.innerText = `${m}:${s}`;
            if(state.timeLeft < 300) el.parentElement.classList.add('animate-pulse', 'bg-red-100'); // red pulse last 5 mins
        }

        function confirmSubmit() {
            const answeredCount = Object.keys(state.answers).length;
            const total = state.examData.questions.length;
            
            iosAlert.fire({
                title: 'Selesai Ujian?',
                html: `Anda menjawab <b>${answeredCount}</b> dari <b>${total}</b> soal.<br><br>Peringatan: Jika Anda selesai, Anda tidak dapat kembali.`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Ya, Selesai',
                cancelButtonText: 'Batal',
                confirmButtonColor: '#007AFF'
            }).then((res) => {
                if (res.isConfirmed) finishExam(false);
            });
        }

        function finishExam(isForced = false) {
            clearInterval(state.timerInterval);
            stopAntiCheat();
            state.view = 'RESULT';
            
            // Calculate basic score inside (optional, but good for metadata)
            let correct = 0;
            state.examData.questions.forEach((q, i) => {
                if(state.answers[i] === q.correct) correct++;
            });

            // Prepare Result Payload
            state.resultPayload = {
                student: state.student,
                examTitle: state.examData.title,
                score: correct,
                totalQuestions: state.examData.questions.length,
                answers: state.answers,
                timestamp: new Date().toISOString(),
                securityReport: {
                    forcedSubmit: isForced,
                    totalStrikes: state.security.strikes,
                    logs: state.security.violationsLog
                }
            };

            render();
        }

        // --- 3. RESULT SCREEN ---
        function renderResult() {
            DOM.className = "h-full w-full bg-white flex items-center justify-center p-4 bg-mesh";
            
            // Encrypt result back using the same token
            const jsonString = JSON.stringify(state.resultPayload);
            const encrypted = CryptoJS.AES.encrypt(jsonString, state.examData.token).toString();
            const blob = new Blob([encrypted], {type: "text/plain"});
            const url = URL.createObjectURL(blob);
            const filename = `HASIL_${state.student.name.replace(/[^a-zA-Z0-9]/g, "")}_${state.examData.title}.enc`;

            let secBadge = state.resultPayload.securityReport.totalStrikes > 0 
                ? `<div class="bg-red-50 text-red-600 text-xs font-bold px-3 py-1 rounded-full mb-4 inline-block border border-red-200"><i class="fa-solid fa-triangle-exclamation"></i> Tercatat ${state.resultPayload.securityReport.totalStrikes} Pelanggaran</div>`
                : `<div class="bg-green-50 text-green-600 text-xs font-bold px-3 py-1 rounded-full mb-4 inline-block border border-green-200"><i class="fa-solid fa-shield-check"></i> Ujian Bersih</div>`;

            DOM.innerHTML = `
                <div class="glass-panel w-full max-w-md rounded-[2rem] p-8 text-center">
                    <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-green-500/40 text-white text-3xl">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">Ujian Selesai</h2>
                    <p class="text-gray-500 text-sm mb-4">Terima kasih, jawaban Anda telah diamankan.</p>
                    
                    ${secBadge}

                    <div class="bg-gray-50 rounded-2xl p-4 text-left mb-6 border border-gray-100 space-y-2">
                        <div class="flex justify-between border-b border-gray-200 pb-2">
                            <span class="text-gray-500 text-sm">Nama Lengkap</span>
                            <span class="font-bold text-gray-900 text-sm">${state.student.name}</span>
                        </div>
                        <div class="flex justify-between pt-1">
                            <span class="text-gray-500 text-sm">Kelas</span>
                            <span class="font-bold text-gray-900 text-sm">${state.student.class}</span>
                        </div>
                    </div>

                    <a href="${url}" download="${filename}" class="block w-full bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-4 font-bold shadow-lg shadow-blue-500/40 transition-all mb-4">
                        <i class="fa-solid fa-download mr-2"></i> Unduh File Hasil
                    </a>
                    
                    <p class="text-xs text-gray-400 mt-4 leading-relaxed">
                        Kirimkan file hasil unduhan (.enc) ini kepada Guru Anda.<br>File ini dienkripsi dengan standar keamanan tinggi.
                    </p>
                </div>
            `;

            // Auto trigger download
            setTimeout(() => {
                const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
            }, 1000);
        }

        // INIT
        render();

        // Safe Area Padding fix for iOS WebApp
        document.head.insertAdjacentHTML('beforeend', `<style>
            .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        </style>`);
    </script>
</body>
</html>
